# ARCHITECTURE: Single vector store, always.
# Both local WSL scripts and Docker services talk to the same ChromaDB container.
# Local WSL: CHROMA_HOST=localhost (port-mapped to 8000)
# Docker services: CHROMA_HOST=chromadb (Docker internal DNS)
# Set CHROMA_MODE=http in .env so local scripts also use the container.

services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data
    environment:
      - ANONYMIZED_TELEMETRY=False

  app:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - chromadb
    environment:
      - CHROMA_MODE=http
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./data:/app/data
    command: >
      sh -c "sleep 15 && streamlit run app.py --server.address=0.0.0.0 --server.port=8501"
    restart: unless-stopped

  ingest:
    build: .
    depends_on:
      - chromadb
    environment:
      - CHROMA_MODE=http
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./data:/app/data
    command: >
      sh -c "sleep 15 &&
             python run_ingest.py &&
             python run_chunk.py &&
             python run_embed.py"
    profiles: ["ingest"]

volumes:
  chroma_data:
    driver: local